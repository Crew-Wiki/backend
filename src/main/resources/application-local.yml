spring:
  datasource:
    url: jdbc:h2:mem:testdb;MODE=MySQL
    driver-class-name: org.h2.Driver

  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console


cors:
  allowed-origins: http://localhost:3000, https://dev.crew-wiki.site, https://dev.api.crew-wiki.site

swagger:
  server-url: https://dev.api.crew-wiki.site

security:
  jwt:
    token:
      secret-key: local-development-secret-key-local-development-secret-key
      expire-length: 3600000

cloud:
  aws:
    credentials:
      access-key: local
      secret-key: local
    s3:
      bucket: local
    region:
      static: ap-northeast-2
    stack:
      auto: false
