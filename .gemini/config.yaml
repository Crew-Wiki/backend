have_fun: false

code_review:
  disable: false
  comment_severity_threshold: MEDIUM
  max_review_comments: 50
  pull_request_opened:
    help: false
    summary: true
    code_review: true

ignore_patterns:
  # Gradle
  - "gradlew"
  - "gradlew.bat"
  - "gradle/wrapper/**"

  # DB initialization
  - "src/main/resources/init.sql"

  # Docs
  - "docs/**"
